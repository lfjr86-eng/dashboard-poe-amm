<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Dashboard POE AMM Guatemala</title>
  <style>
    :root{--o:#f28c00;--d:#414244;--g:#6f7377;--bg:#f4f5f6;--l:#e6e7e8}*{box-sizing:border-box}body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--d)}header{padding:30px 5vw 26px;background:linear-gradient(135deg,#303133,#57595d);color:#fff}h1{margin:0;font-size:clamp(1.8rem,4vw,3rem)}header p{margin:8px 0 0;color:#e5e5e5}.tabs{display:flex;gap:8px;max-width:1500px;margin:0 auto;padding:16px 5vw 0}.tab{border:0;border-radius:10px 10px 0 0;padding:12px 18px;font:700 .92rem Inter,Segoe UI,Arial,sans-serif;color:var(--g);background:#e7e9eb;cursor:pointer}.tab.active{color:#fff;background:var(--o)}main{max-width:1500px;margin:0 auto;padding:0 5vw 24px}.panel{display:none;background:#fff;border:1px solid var(--l);border-radius:0 16px 16px 16px;box-shadow:0 8px 24px #0000000a;overflow:hidden}.panel.active{display:block}iframe{display:block;border:0;width:100%;height:1460px;background:#f4f5f6}@media(max-width:700px){header{padding:22px 16px}.tabs,main{padding-left:12px;padding-right:12px}.tab{flex:1;padding:11px 8px;font-size:.8rem}iframe{height:1780px}}
  </style>
</head>
<body>
  <header><h1>Dashboard histórico del POE</h1><p>Valorizado en el nodo de referencia</p></header>
  <nav class="tabs" aria-label="Secciones del dashboard"><button class="tab active" data-tab="historico">Histórico y tendencia</button><button class="tab" data-tab="perfiles">Perfiles típicos</button></nav>
  <main>
    <section class="panel active" id="historico"><iframe title="Dashboard histórico del POE" src="historico-v2.html"></iframe></section>
    <section class="panel" id="perfiles"><iframe title="Perfiles típicos del POE" src="perfiles-v2.html"></iframe></section>
  </main>
  <script>const tabs=document.querySelectorAll('.tab'),panels=document.querySelectorAll('.panel'),profileFrame=document.querySelector('#perfiles iframe');function show(id){tabs.forEach(x=>x.classList.toggle('active',x.dataset.tab===id));panels.forEach(x=>x.classList.toggle('active',x.id===id));history.replaceState(null,'','#'+id)}tabs.forEach(x=>x.onclick=()=>show(x.dataset.tab));profileFrame.onload=()=>{let a=profileFrame.contentDocument.querySelector('a[href="index.html"]');if(a){a.href='index.html#historico';a.target='_top'}};show(location.hash.slice(1)==='perfiles'?'perfiles':'historico');</script>
</body>
</html>
