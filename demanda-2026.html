<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SIS-DIS 2026</title><script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script><script src="data-demanda-2026.js"></script><style>:root{--o:#f28c00;--d:#414244;--g:#6f7377;--bg:#f4f5f6;--l:#e6e7e8}*{box-sizing:border-box}body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--d)}header{padding:32px 5vw;background:linear-gradient(135deg,#303133,#57595d);color:#fff}h1{margin:0;font-size:clamp(1.7rem,4vw,2.8rem)}header p{margin:8px 0 0;color:#e5e5e5}.wrap{max-width:1500px;margin:auto;padding:22px}.card{background:#fff;border:1px solid var(--l);border-radius:16px;box-shadow:0 8px 24px #0000000a;padding:16px}.controls,.kpis,.grid{display:grid;gap:18px}.controls{grid-template-columns:repeat(3,minmax(160px,1fr))}.kpis{grid-template-columns:repeat(4,1fr);margin:18px 0}.grid{grid-template-columns:1fr 1fr;margin-bottom:18px}.chart{height:360px}label{font-size:.75rem;font-weight:700;color:var(--g)}input,button{width:100%;margin-top:6px;padding:11px;border-radius:10px;border:1px solid var(--l);font:inherit;background:#fff}button{background:var(--o);color:#fff;font-weight:700;border:0;cursor:pointer}.val{font-size:1.65rem;font-weight:800;margin-top:7px}.hint,.foot{color:var(--g);line-height:1.55}.foot b{color:var(--d)}@media(max-width:900px){.grid{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}@media(max-width:550px){.controls,.kpis{grid-template-columns:1fr}.wrap{padding:12px}.chart{height:320px}}</style></head><body><header><h1>Precio spot de la energía para la demanda</h1><p>Valorizado en el nodo virtual de demanda (SIS-DIS)</p></header><main class="wrap"><section class="card controls"><label>Desde<input id="a" type="month" value="2026-01" min="2026-01" max="2026-06"></label><label>Hasta<input id="b" type="month" value="2026-06" min="2026-01" max="2026-06"></label><label>&nbsp;<button id="reset">Restablecer período</button></label></section><section class="kpis" id="k"></section><section class="grid"><article class="card"><h2>Tendencia mensual</h2><div id="trend" class="chart"></div></article><article class="card"><h2>Curva típica horaria</h2><div id="hour" class="chart"></div></article></section><section class="grid"><article class="card"><h2>Perfil típico por día de la semana</h2><div id="week" class="chart"></div></article><article class="card"><h2>Promedio por banda horaria</h2><div id="bands" class="chart"></div></article></section><section class="card foot"><b>Período de datos: enero–junio 2026.</b> Este sitio no es una publicación oficial del AMM.</section></main><script>const N=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'],DAYS=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];let u=Uint8Array.from(atob(SISDIS_2026_B64),c=>c.charCodeAt(0)),A=[],i=0;for(let m=0;m<6;m++)for(let d=1;d<=new Date(2026,m+1,0).getDate();d++)for(let h=0;h<24;h++,i++)A.push({m,d,h,v:(u[i*2]|u[i*2+1]<<8)/100,date:new Date(2026,m,d,h)});const avg=x=>x.reduce((s,v)=>s+v,0)/x.length,money=x=>'$'+x.toLocaleString('es-GT',{minimumFractionDigits:2,maximumFractionDigits:2}),band=x=>x.h<6||x.h>=23?'Mínima':(x.h<10||x.h>=13&&x.h<18||x.h>=21?'Intermedia':'Punta'),lay=()=>({margin:{l:55,r:15,t:16,b:45},paper_bgcolor:'transparent',plot_bgcolor:'transparent',font:{family:'Inter,Segoe UI,Arial',color:'#414244'},xaxis:{gridcolor:'#e6e7e8'},yaxis:{gridcolor:'#e6e7e8',title:'USD/MWh'},hovermode:'x unified',legend:{orientation:'h',y:-.22}});function run(){if(a.value>b.value){let z=a.value;a.value=b.value;b.value=z}let q=A.filter(x=>{let z='2026-'+String(x.m+1).padStart(2,'0');return z>=a.value&&z<=b.value}),months=[...new Set(q.map(x=>x.m))],mm=months.map(m=>avg(q.filter(x=>x.m===m).map(x=>x.v))),hh=[...Array(24)].map(h=>avg(q.filter(x=>x.h===h).map(x=>x.v))),bb=['Mínima','Intermedia','Punta'].map(z=>avg(q.filter(x=>band(x)===z).map(x=>x.v))),wd=[...Array(7)].map(w=>[...Array(24)].map(h=>avg(q.filter(x=>x.date.getDay()===(w+1)%7&&x.h===h).map(x=>x.v))));k.innerHTML=[['Promedio del período',money(avg(q.map(x=>x.v))),q.length.toLocaleString('es-GT')+' horas'],['Máximo horario',money(Math.max(...q.map(x=>x.v))),'rango seleccionado'],['Banda punta',money(bb[2]),'promedio histórico'],['Hora típica más alta',String(hh.indexOf(Math.max(...hh))).padStart(2,'0')+':00',money(Math.max(...hh))]].map(x=>'<article class="card"><div>'+x[0]+'</div><div class="val">'+x[1]+'</div><div class="hint">'+x[2]+'</div></article>').join('');Plotly.react('trend',[{x:months.map(m=>'2026-'+String(m+1).padStart(2,'0')),y:mm,type:'scatter',mode:'lines+markers',line:{color:'#f28c00',width:3},fill:'tozeroy',fillcolor:'rgba(242,140,0,.08)'}],lay(),{responsive:true,displaylogo:false});Plotly.react('hour',[{x:[...Array(24).keys()],y:hh,type:'scatter',mode:'lines+markers',line:{color:'#f28c00',width:3}}],lay(),{responsive:true,displaylogo:false});Plotly.react('week',wd.map((x,i)=>({x:[...Array(24).keys()],y:x,name:DAYS[i],type:'scatter',mode:'lines'})),lay(),{responsive:true,displaylogo:false});Plotly.react('bands',[{x:['Mínima','Intermedia','Punta'],y:bb,type:'bar',marker:{color:['#4b90c8','#f28c00','#bd3b3b']}}],lay(),{responsive:true,displaylogo:false})}[a,b].forEach(x=>x.onchange=run);reset.onclick=()=>{a.value='2026-01';b.value='2026-06';run()};run()</script></body></html>
